<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>商品管理系统</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{padding:20px;font-family:Microsoft Yahei}
    .top{text-align:right;margin-bottom:15px}
    h1{text-align:center;margin-bottom:20px}
    .search,.add{text-align:center;margin-bottom:15px}
    input{padding:6px 10px;margin:0 5px;width:170px}
    button{padding:6px 12px;background:#007bff;color:white;border:none;border-radius:4px;cursor:pointer}
    table{width:90%;margin:0 auto;border-collapse:collapse}
    th,td{border:1px solid #ccc;padding:8px;text-align:center}
    .edit{background:#28a745}
    .del{background:#dc3545}
  </style>
</head>
<body>
  <div class="top">
    <button onclick="logout()">退出登录</button>
  </div>
  <h1>商品管理</h1>

  <div class="search">
    <input id="kw" placeholder="搜索商品">
    <button onclick="search()">搜索</button>
    <button onclick="reset()">重置</button>
  </div>

  <div class="add">
    <input id="name" placeholder="商品名">
    <input id="price" type="number" placeholder="价格">
    <input id="stock" type="number" placeholder="库存">
    <button onclick="add()">添加</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>商品名</th>
        <th>价格</th>
        <th>库存</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody id="list"></tbody>
  </table>

  <script>
    const token = localStorage.getItem('token');
    if(!token) location.href='/login.html';

    function render(arr){
      const html = arr.map(p=>`
        <tr>
          <td>${p.id}</td>
          <td>${p.name}</td>
          <td>${p.price}</td>
          <td>${p.stock}</td>
          <td>
            <button class="edit" onclick="edit(${p.id})">编辑</button>
            <button class="del" onclick="del(${p.id})">删除</button>
          </td>
        </tr>
      `).join('');
      document.getElementById('list').innerHTML = html;
    }

    async function getList(){
      const r = await fetch('/api/products',{headers:{Authorization:'Bearer '+token}});
      const d = await r.json();
      render(d.data.list);
    }

    async function search(){
      const kw = document.getElementById('kw').value;
      const r = await fetch('/api/products?keyword='+kw,{headers:{Authorization:'Bearer '+token}});
      const d = await r.json();
      render(d.data.list);
    }

    function reset(){
      document.getElementById('kw').value='';
      getList();
    }

    async function add(){
      const name = document.getElementById('name').value;
      const price = document.getElementById('price').value;
      const stock = document.getElementById('stock').value;
      if(!name||!price||!stock){alert('请填写完整');return}

      const r = await fetch('/api/product',{
        method:'POST',
        headers:{
          'Content-Type':'application/json',
          'Authorization':'Bearer '+token
        },
        body:JSON.stringify({name,price,stock})
      });
      const d = await r.json();
      alert(d.msg);
      if(d.code===200){
        document.getElementById('name').value='';
        document.getElementById('price').value='';
        document.getElementById('stock').value='';
        getList();
      }
    }

    async function edit(id){
      const r = await fetch('/api/product/'+id,{headers:{Authorization:'Bearer '+token}});
      const d = await r.json();
      if(d.code!==200){alert(d.msg);return}

      const p = d.data;
      const newName = prompt('商品名',p.name);
      if(newName===null)return;
      const newPrice = prompt('价格',p.price);
      if(newPrice===null)return;
      const newStock = prompt('库存',p.stock);
      if(newStock===null)return;

      const res = await fetch('/api/product/'+id,{
        method:'PUT',
        headers:{
          'Content-Type':'application/json',
          'Authorization':'Bearer '+token
        },
        body:JSON.stringify({
          name:newName,
          price:parseFloat(newPrice),
          stock:parseInt(newStock)
        })
      });
      const data = await res.json();
      alert(data.msg);
      if(data.code===200) getList();
    }

    async function del(id){
      if(!confirm('确定删除？'))return;
      const r = await fetch('/api/product/'+id,{
        method:'DELETE',
        headers:{Authorization:'Bearer '+token}
      });
      const d = await r.json();
      alert(d.msg);
      if(d.code===200) getList();
    }

    function logout(){
      localStorage.removeItem('token');
      alert('已退出');
      location.href='/login.html';
    }

    getList();
  </script>
</body>
</html>
