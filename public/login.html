<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>登录</title>
  <style>
    .login-box { max-width: 300px; margin: 100px auto; padding: 20px; border: 1px solid #ccc; }
    input { width: 100%; margin: 10px 0; padding: 8px; }
    button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>登录</h2>
    <input id="username" placeholder="账号" value="admin">
    <input id="password" type="password" placeholder="密码" value="123456">
    <button onclick="login()">登录</button>
  </div>
  <script>
    async function login() {
      const res = await fetch('/api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value,
          password: document.getElementById('password').value
        })
      });
      const data = await res.json();
      if (data.code === 200) {
        localStorage.setItem('token', data.data.token);
        location.href = '/admin.html';
      } else {
        alert(data.msg);
      }
    }
  </script>
</body>
</html>
